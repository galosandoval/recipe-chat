name: Main

on:
  push:
    branches:
      - main

jobs:
  migrate-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v3

      - name: Install dependencies
        run: bun install

      - name: Cache build
        uses: actions/cache@v3
        with:
          path: |
            ~/.bun/install/cache
            ${{ github.workspace }}/.next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-

      - run: bun run build

      - name: Resolve failed migration that was already applied to production
        run: bunx prisma migrate resolve --applied 20251019025207_add_recipes_slug
        env:
          DATABASE_URL_NON_POOLING: ${{ secrets.DATABASE_URL_NON_POOLING }}
          DATABASE_PRISMA_URL: ${{ secrets.DATABASE_PRISMA_URL }}

      - name: Apply all pending migrations to the database
        run: bunx prisma migrate deploy
        env:
          DATABASE_URL_NON_POOLING: ${{ secrets.DATABASE_URL_NON_POOLING }}
          DATABASE_PRISMA_URL: ${{ secrets.DATABASE_PRISMA_URL }}

      - name: Run data migrations for new migrations
        run: |
          BEFORE="${{ github.event.before }}"
          # Handle first push or force push (before is all zeros)
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "No previous commit to diff against, skipping data migrations"
            exit 0
          fi
          NEW_DIRS=$(git diff --name-only "$BEFORE" "${{ github.sha }}" \
            | grep '^prisma/migrations/.*/migration\.sql$' \
            | sed 's|/migration\.sql||')
          for DIR in $NEW_DIRS; do
            if [ -f "$DIR/data-migration.ts" ]; then
              echo "Running data migration: $DIR/data-migration.ts"
              bun "$DIR/data-migration.ts"
            fi
          done
        env:
          DATABASE_URL_NON_POOLING: ${{ secrets.DATABASE_URL_NON_POOLING }}
          DATABASE_PRISMA_URL: ${{ secrets.DATABASE_PRISMA_URL }}
