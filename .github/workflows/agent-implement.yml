name: Agent — Implement

# Slice 2b (#510): the real test-driven implementation agent. Adding
# `agent:implement` to a leaf issue fires this workflow, which runs Claude via
# Sandcastle (`noSandbox()` — the ephemeral runner is the isolation boundary)
# against a Postgres + pgvector service DB, does red-green-refactor, runs the
# repo's quality gate, commits when green, and opens a draft PR linked to the
# issue. No Docker, no GHCR image, no ANTHROPIC_API_KEY.
#
# Slice 3 (#511): a `preflight` job refuses non-leaf / already-PR'd issues
# *before* any branch or PR work, and the `implement` job runs only when
# pre-flight passes. Failure / zero-commit handling and the `always()` clear of
# `agent:in-progress` live in the implement job.

on:
  issues:
    types: [labeled]

jobs:
  preflight:
    # Run only for the go/spend label, and only when the maintainer added it.
    # The repo is public, so an unguarded trigger would let anyone spend the
    # maintainer's subscription. A skipped job is the "does nothing" no-op, and
    # because `implement` needs this job, skipping here skips the whole run.
    if: github.event.label.name == 'agent:implement' && github.actor == 'galosandoval'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Surfaces the refusal verdict to the implement job's `if`.
    outputs:
      refused: ${{ steps.preflight.outputs.refused }}
    env:
      # AGENT_PAT so the label swap + comment fire downstream events like the
      # rest of the pipeline (GITHUB_TOKEN-driven label events don't).
      GH_TOKEN: ${{ secrets.AGENT_PAT }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Pre-flight refusal gate
        id: preflight
        # Refuses (remove agent:implement, add agent:blocked, comment) when the
        # issue is a PRD, a native sub-issue, or already has an open PR, and
        # sets `refused=true/false`. No branch/PR is created on refusal.
        run: bun .sandcastle/implement/run-preflight.ts

      - name: Mark blocked if pre-flight itself errored
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --remove-label "agent:implement" \
            --add-label "agent:blocked" || true
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$(printf '`agent:implement` pre-flight check failed to run.\n\n**Run:** %s\n\nRe-add `agent:implement` to retry.' "$RUN_URL")" || true

  implement:
    needs: preflight
    # Only proceed when pre-flight ran and explicitly passed. A skipped pre-flight
    # (wrong label/actor) leaves `refused` empty, so this stays skipped too.
    if: needs.preflight.outputs.refused == 'false'
    runs-on: ubuntu-latest
    # Hard wall-clock cap on the whole run (runaway guard #1).
    timeout-minutes: 45

    services:
      # Same image/env pattern as .github/workflows/test.yml, so the agent can
      # run the full integration suite during TDD.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: recipe_chat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # AGENT_PAT (not GITHUB_TOKEN): GitHub does not fire downstream workflows
      # from GITHUB_TOKEN-driven label events, and pushing under
      # .github/workflows/ needs the PAT's `workflow` scope.
      GH_TOKEN: ${{ secrets.AGENT_PAT }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      # The integration suite + any TDD against the DB connect here; the
      # pgvector extension + HNSW index are created by `prisma migrate deploy`.
      DATABASE_PRISMA_URL: postgresql://postgres:postgres@localhost:5432/recipe_chat_test
      DATABASE_URL_NON_POOLING: postgresql://postgres:postgres@localhost:5432/recipe_chat_test

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AGENT_PAT }}
          fetch-depth: 0

      - name: Start — remove agent:implement, add agent:in-progress
        run: |
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --remove-label "agent:implement" \
            --remove-label "agent:blocked" \
            --add-label "agent:in-progress"

      - name: Compute branch name
        id: branch
        run: |
          slug=$(printf '%s' "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-50 \
            | sed -E 's/-+$//')
          echo "name=agent/issue-${ISSUE_NUMBER}-${slug}" >> "$GITHUB_OUTPUT"

      - name: Create branch
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git config user.name "claude-code[bot]"
          git config user.email "claude-code[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      - name: Install Claude Code CLI
        run: bun install -g @anthropic-ai/claude-code

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Apply migrations to the service database
        run: bunx prisma migrate deploy

      - name: Install Playwright browser
        # The agent's VERIFY phase runs `bun run test:e2e` (headless Chromium)
        # against the booted app. Install the browser + OS deps here so the
        # agent doesn't need sudo. --with-deps is a no-op on an already-set-up
        # runner but keeps this self-contained (no Docker, no browser service).
        run: bunx playwright install --with-deps chromium

      - name: Fetch coding standards
        # Single source of truth: the coding-standard rules live in the public
        # skills repo (symlinked into ~/.claude/rules locally). CI can't resolve
        # that symlink, so shallow-clone the repo and point the agent at rules/
        # via STANDARDS_DIR. Cloned under RUNNER_TEMP so the files never enter
        # the repo tree or a commit.
        run: git clone --depth 1 https://github.com/galosandoval/skills.git "${RUNNER_TEMP}/skills"

      - name: Run implementation agent
        id: implement
        env:
          # Subscription / flat-rate token — not ANTHROPIC_API_KEY.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
          # The agent writes pr_description.txt / failure_reason.txt here, outside
          # the repo, so they never land in a commit.
          OUTPUT_DIR: ${{ runner.temp }}
          # Coding-standard rules cloned by the "Fetch coding standards" step.
          STANDARDS_DIR: ${{ runner.temp }}/skills/rules
          # App/suite paths the agent may exercise during TDD.
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # The verify phase boots the same `next start` production build, so
          # Auth.js would reject the untrusted host and break the e2e login the
          # same way the PR e2e gate would. Trust the host explicitly here too.
          AUTH_TRUST_HOST: true
        run: bun .sandcastle/implement/implement.ts

      - name: Push branch
        id: push_branch
        if: success()
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: git push -u origin "$BRANCH"

      - name: Post verify proof to the issue
        # Runs whenever the branch was pushed (so raw.githubusercontent URLs
        # resolve), regardless of any later step's status: read the agent's
        # verify report, enumerate the committed screenshots under
        # .agent/verify/issue-<N>/, and post one issue comment with the report +
        # inline images + a run link. Best-effort — the script swallows errors,
        # and the agent's verify phase never fails its step, so a verify hiccup
        # still yields a comment and never loses the green implement commits.
        if: steps.push_branch.outcome == 'success'
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
          OUTPUT_DIR: ${{ runner.temp }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bun .sandcastle/implement/post-verify.ts

      - name: Open draft PR
        if: success()
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          # PR body = agent-written description with `Closes #N` prepended so the
          # PR links the issue and merging auto-closes it.
          body_file="${RUNNER_TEMP}/pr_body.txt"
          {
            printf 'Closes #%s\n\n' "$ISSUE_NUMBER"
            cat "${RUNNER_TEMP}/pr_description.txt"
          } > "$body_file"
          gh pr create --draft --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$BRANCH" \
            --title "$ISSUE_TITLE" \
            --body-file "$body_file"

      - name: Mark blocked on failure
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          reason="(no reason file written — see the workflow logs)"
          if [ -f "${RUNNER_TEMP}/failure_reason.txt" ]; then
            reason=$(cat "${RUNNER_TEMP}/failure_reason.txt")
          fi
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --add-label "agent:blocked" || true
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$(printf '`agent:implement` run failed.\n\n**Reason:** %s\n\n**Run:** %s\n\nRe-add `agent:implement` to retry.' "$reason" "$RUN_URL")" || true

      - name: Always — clear agent:in-progress
        if: always()
        run: |
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --remove-label "agent:in-progress" || true
