# Compose definition for `agent:local` (#541) — a faithful CI rehearsal run.
# `db` mirrors the `pgvector/pgvector:pg16` service container
# .github/workflows/agent-implement.yml uses, created fresh and torn down
# every run (`docker compose down -v` after `agent` exits). `agent` builds the
# local rehearsal image and does the actual clone/setup/orchestrate/push-back
# work in entrypoint.sh. Local-only — CI never touches this file.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recipe_chat_test
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  agent:
    build:
      context: ../..
      dockerfile: agent/local/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ISSUE_NUMBER: ${ISSUE_NUMBER:?Set ISSUE_NUMBER}
      GH_TOKEN: ${GH_TOKEN:?Set GH_TOKEN}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:?Set CLAUDE_CODE_OAUTH_TOKEN}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY}
      AUTH_TRUST_HOST: 'true'
      DATABASE_PRISMA_URL: postgresql://postgres:postgres@db:5432/recipe_chat_test
      DATABASE_URL_NON_POOLING: postgresql://postgres:postgres@db:5432/recipe_chat_test
      HOST_REPO_DIR: /host-repo
      STANDARDS_DIR: /standards
      LOCAL_WALL_CLOCK_MINUTES: ${LOCAL_WALL_CLOCK_MINUTES:-45}
      LOCAL_IDLE_MINUTES: ${LOCAL_IDLE_MINUTES:-10}
    volumes:
      # Only the git object/ref database — never the host's working tree, so
      # the container has no visibility into uncommitted changes, .env files,
      # or anything else on disk. entrypoint.sh clones and pushes back here.
      - type: bind
        source: ${HOST_GIT_DIR:?Set HOST_GIT_DIR}
        target: /host-repo/.git
      - type: bind
        source: ${STANDARDS_HOST_DIR:?Set STANDARDS_HOST_DIR}
        target: /standards
        read_only: true
